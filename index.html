<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mooney Fleet Map</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#0d1117;color:#e6edf3}
#map{position:absolute;inset:0}
#hdr{position:absolute;top:0;left:0;right:0;z-index:500;background:linear-gradient(90deg,rgba(13,17,23,.97),rgba(22,27,34,.97));border-bottom:2px solid #e63946;padding:6px 12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;backdrop-filter:blur(4px)}
#hdr h1{font-size:.95em;font-weight:700;color:#fff;white-space:nowrap;flex-shrink:0}
#hdr h1 em{color:#e63946;font-style:normal}
#hdr-stats{font-size:.68em;color:#8b949e;white-space:nowrap}
#ctrls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex:1}
.cl{font-size:.68em;color:#8b949e;white-space:nowrap}
input[type=text],select{background:#161b22;border:1px solid #30363d;color:#e6edf3;border-radius:5px;padding:3px 8px;font-size:.76em;outline:none}
input[type=text]{width:150px}
input[type=text]:focus,select:focus{border-color:#e63946}
.btn{background:#e63946;border:none;color:#fff;border-radius:5px;padding:4px 11px;font-size:.73em;cursor:pointer;font-weight:600;white-space:nowrap}
.btn:hover{background:#c1121f}
.btn.sec{background:#21262d}.btn.sec:hover{background:#30363d}
.overlay{position:absolute;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;background:rgba(10,14,20,.95);backdrop-filter:blur(6px)}
.card{background:#161b22;border:1px solid #30363d;border-radius:14px;padding:30px 34px;max-width:480px;width:92%;text-align:center}
.card h2{font-size:1.2em;margin-bottom:10px;color:#fff}
.card p{font-size:.82em;color:#8b949e;line-height:1.6;margin-bottom:12px}
.prog-wrap{background:#0d1117;border-radius:8px;height:10px;overflow:hidden;margin-bottom:8px}
.prog-bar{background:linear-gradient(90deg,#e63946,#fb8500);height:100%;width:0;transition:width .25s;border-radius:8px}
.prog-lbl{font-size:.73em;color:#8b949e;margin-bottom:12px}
.skip-link{font-size:.71em;color:#58a6ff;cursor:pointer;text-decoration:underline}
.err-detail{color:#f08080;font-size:.8em;margin-bottom:10px}
#legend{position:absolute;bottom:24px;right:10px;z-index:400;background:rgba(13,17,23,.93);border:1px solid #30363d;border-radius:8px;padding:9px 12px;max-height:65vh;overflow-y:auto;min-width:155px}
#legend h3{font-size:.67em;color:#8b949e;text-transform:uppercase;letter-spacing:1px;margin-bottom:7px}
.li{display:flex;align-items:center;gap:6px;margin-bottom:4px;cursor:pointer;padding:2px 3px;border-radius:4px}
.li:hover{background:rgba(230,57,70,.12)}
.li.off{opacity:.28}
.dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;border:1.5px solid rgba(255,255,255,.22)}
.ll{font-size:.73em;flex:1}
.lc{font-size:.65em;color:#8b949e}
#badge{position:absolute;top:52px;left:50%;transform:translateX(-50%);background:rgba(13,17,23,.88);border:1px solid #30363d;border-radius:16px;padding:3px 13px;font-size:.71em;color:#8b949e;z-index:400;pointer-events:none;white-space:nowrap}
#badge b{color:#e63946}
</style>
</head>
<body>
<div id="map"></div>
<div id="hdr" style="display:none">
  <h1>&#9992; Mooney Fleet &nbsp;<em>FAA Registry</em></h1>
  <span id="hdr-stats"></span>
  <div id="ctrls">
    <span class="cl">Search</span>
    <input type="text" id="q" placeholder="N-number or owner..." oninput="doFilter()">
    <span class="cl">Model</span>
    <select id="sel-m" onchange="doFilter()"><option value="">All Models</option></select>
    <span class="cl">State</span>
    <select id="sel-s" onchange="doFilter()"><option value="">All States</option></select>
    <button class="btn" onclick="resetAll()">Reset</button>
    <button class="btn sec" onclick="toggleLegend()">Legend</button>
  </div>
</div>
<div id="badge" style="display:none"><b id="vis-n">-</b> aircraft shown</div>
<div id="legend" style="display:none"><h3>Model Legend</h3><div id="leg"></div></div>

<div class="overlay" id="ov-prog">
  <div class="card">
    <h2>Loading Mooney Fleet Map...</h2>
    <p>Placing each aircraft at its registered owner's mailing address.</p>
    <div class="prog-wrap"><div class="prog-bar" id="prog-bar"></div></div>
    <div class="prog-lbl" id="prog-lbl">Initializing...</div>
    <span class="skip-link" onclick="skipGeo()" style="display:none" id="skip-btn">Skip remaining</span>
  </div>
</div>

<div class="overlay" id="ov-err" style="display:none">
  <div class="card">
    <h2 style="color:#e63946">Map Unavailable</h2>
    <p class="err-detail" id="err-detail"></p>
    <p>Please try again later or contact the site administrator.</p>
  </div>
</div>

async function decodeData() {
  const bin = atob(B64), arr = new Uint8Array(bin.length);
  for (let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  const ds=new DecompressionStream('gzip'), w=ds.writable.getWriter(), r=ds.readable.getReader();
  w.write(arr); w.close();
  const chunks=[]; while(true){const o=await r.read(); if(o.done)break; chunks.push(o.value);}
  const buf=new Uint8Array(chunks.reduce((s,c)=>s+c.length,0)); let off=0;
  for(const c of chunks){buf.set(c,off);off+=c.length;}
  return JSON.parse(new TextDecoder().decode(buf));
}

function loadMapsScript() {
  if (!GOOGLE_MAPS_API_KEY || GOOGLE_MAPS_API_KEY.indexOf('PASTE_YOUR') === 0) {
    showErr('No API key configured. The site administrator needs to add a Google Maps API key in the HTML source.');
    return;
  }
  window._mapsTimeout = setTimeout(() => {
    showErr('Google Maps failed to load. The API key may be invalid, restricted to a different domain, or missing required APIs (Maps JavaScript API, Geocoding API).');
  }, 9000);
  const s=document.createElement('script');
  s.src = 'https://maps.googleapis.com/maps/api/js?key=' + GOOGLE_MAPS_API_KEY + '&callback=mapsReady&loading=async';
  s.onerror=()=>showErr('Failed to load the Google Maps script. Check your internet connection.');
  document.head.appendChild(s);
}

window.mapsReady = async function() {
  clearTimeout(window._mapsTimeout);
  mapObj = new google.maps.Map(document.getElementById('map'), {
    center:{lat:39.5,lng:-98.5}, zoom:4, mapTypeId:'roadmap', styles:darkStyle(),
    mapTypeControl:true, streetViewControl:false, fullscreenControl:true,
    zoomControlOptions:{position:google.maps.ControlPosition.RIGHT_BOTTOM},
  });
  geocoder = new google.maps.Geocoder();
  infoWin  = new google.maps.InfoWindow();

  try { geoCache = JSON.parse(localStorage.getItem(CACHE_KEY) || '{}'); } catch(e) { geoCache = {}; }

  allRecs = await decodeData();
  buildSelectors();
  buildLegend();
  document.getElementById('hdr-stats').textContent = allRecs.length.toLocaleString() + ' valid registrations | 26 models | FAA data';
  document.getElementById('hdr').style.display = 'flex';
  document.getElementById('badge').style.display = 'block';
  document.getElementById('legend').style.display = 'block';

  const needGeo = allRecs.filter(r => !geoCache[r[0]]);
  if (needGeo.length > 0) {
    document.getElementById('skip-btn').style.display = 'inline';
    await geocodeAll(allRecs);
  }
  document.getElementById('ov-prog').style.display = 'none';
  placeMarkers();
};

function showErr(msg) {
  clearTimeout(window._mapsTimeout);
  document.getElementById('err-detail').textContent = msg;
  document.getElementById('ov-prog').style.display = 'none';
  document.getElementById('ov-err').style.display = 'flex';
}

function buildAddrStr(r) {
  const st1=r[3], st2=r[4], city=r[5], state=r[6], zip=r[7];
  return [[st1,st2].filter(Boolean).join(' '), city, state, (zip||'').slice(0,5)].filter(Boolean).join(', ');
}

function fallback(r) {
  const seed=r[0]; let h=0; for(const c of seed) h=(h*31+c.charCodeAt(0))>>>0;
  const state=r[6], country=r[8];
  if (ST_LL[state]) {
    const ll=ST_LL[state];
    return {lat:ll[0]+((h%89)-44)*0.016, lon:ll[1]+((h%67)-33)*0.022, src:'state'};
  }
  if (CO_LL[country]) { const ll=CO_LL[country]; return {lat:ll[0],lon:ll[1],src:'country'}; }
  return null;
}

function skipGeo(){ _stopGeo = true; }

async function geocodeAll(recs) {
  const bar=document.getElementById('prog-bar'), lbl=document.getElementById('prog-lbl');
  const todo = recs.filter(r => !geoCache[r[0]]);
  let done = recs.length - todo.length, total = recs.length;
  _stopGeo = false;
  const BATCH=8, DELAY=130;
  for (let i=0;i<todo.length;i+=BATCH) {
    if (_stopGeo) break;
    await Promise.all(todo.slice(i,i+BATCH).map(async r => {
      const addr = buildAddrStr(r);
      let result = null;
      if (addr.trim()) {
        result = await new Promise(res => {
          geocoder.geocode({address:addr}, (results,status) => {
            if (status==='OK' && results[0]) {
              const loc=results[0].geometry.location;
              res({lat:loc.lat(), lon:loc.lng(), src:'geocoded'});
            } else res(null);
          });
        });
      }
      if (!result) result = fallback(r);
      if (result) geoCache[r[0]] = result;
      done++;
    }));
    bar.style.width = (done/total*100).toFixed(1) + '%';
    lbl.textContent = done.toLocaleString() + ' / ' + total.toLocaleString() + ' (' + Math.round(done/total*100) + '%)';
    if (done % 200 === 0) saveCache();
    await sleep(DELAY);
  }
  recs.forEach(r => { if (!geoCache[r[0]]) { const fb=fallback(r); if (fb) geoCache[r[0]]=fb; } });
  saveCache();
}

function saveCache(){ try{ localStorage.setItem(CACHE_KEY, JSON.stringify(geoCache)); }catch(e){} }

function svgIcon(color){
  const s = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14"><circle cx="7" cy="7" r="5.5" fill="'+color+'" stroke="white" stroke-width="1.6"/></svg>';
  return {url:'data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(s), anchor:new google.maps.Point(7,7)};
}

function placeMarkers() {
  markers.forEach(m => m.mk.setMap(null)); markers = [];
  allRecs.forEach(r => {
    const n=r[0], m=r[1], o=r[2], st1=r[3], st2=r[4], city=r[5], state=r[6], zip=r[7], year=r[9];
    const ll = geoCache[n]; if (!ll) return;
    const mk = new google.maps.Marker({
      position:{lat:ll.lat,lng:ll.lon}, map:mapObj,
      icon:svgIcon(MODEL_COLOR[m]||'#888'), title:n+' - '+m, optimized:true,
    });
    const addr = [[st1,st2].filter(Boolean).join(', '), city, [state,zip].filter(Boolean).join(' ')].filter(Boolean).join(', ') || '-';
    const srcTxt = ll.src==='geocoded' ? 'Geocoded to mailing address'
      : ll.src==='state' ? 'Address unresolved - state centroid used' : 'Foreign address - approximate';
    const srcColor = ll.src==='geocoded' ? '#2a9d8f' : '#e08030';
    mk.addListener('click', () => {
      infoWin.setContent(
        '<div style="font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;min-width:200px">' +
        '<div style="font-size:1.05em;font-weight:700;color:#e63946;margin-bottom:2px">'+n+'</div>' +
        '<div style="font-size:.82em;font-weight:600;color:#1f6feb;margin-bottom:7px">'+m+'</div>' +
        '<div style="font-size:.78em;color:#333;margin:3px 0"><b style="color:#111">Owner:</b> '+(o||'Withheld / Unknown')+'</div>' +
        '<div style="font-size:.78em;color:#333;margin:3px 0"><b style="color:#111">Address:</b> '+addr+'</div>' +
        (year ? '<div style="font-size:.78em;color:#333;margin:3px 0"><b style="color:#111">Year Mfr:</b> '+year+'</div>' : '') +
        '<div style="font-size:.65em;margin-top:7px;font-style:italic;color:'+srcColor+'">'+srcTxt+'</div></div>'
      );
      infoWin.open(mapObj, mk);
    });
    markers.push({mk, n, m, o, state});
  });
  updateCount();
}

function doFilter() {
  const q = document.getElementById('q').value.trim().toLowerCase();
  const sm = document.getElementById('sel-m').value;
  const ss = document.getElementById('sel-s').value;
  let vis = 0;
  markers.forEach(({mk,n,m,o,state}) => {
    const show = !hiddenModels.has(m) && (!sm||m===sm) && (!ss||state===ss)
      && (!q || n.toLowerCase().includes(q) || o.toLowerCase().includes(q));
    mk.setVisible(show); if (show) vis++;
  });
  document.getElementById('vis-n').textContent = vis.toLocaleString();
  syncLegend();
}

function resetAll() {
  hiddenModels.clear();
  document.getElementById('q').value = '';
  document.getElementById('sel-m').value = '';
  document.getElementById('sel-s').value = '';
  doFilter();
}

function updateCount(){ document.getElementById('vis-n').textContent = markers.length.toLocaleString(); }

function buildLegend() {
  const el = document.getElementById('leg'); el.innerHTML = '';
  LEGEND.forEach(l => {
    const d = document.createElement('div'); d.className = 'li'; d.id = 'li-'+l.model;
    d.innerHTML = '<div class="dot" style="background:'+l.color+'"></div><span class="ll">'+l.model+'</span><span class="lc">'+l.count.toLocaleString()+'</span>';
    d.onclick = () => { hiddenModels.has(l.model) ? hiddenModels.delete(l.model) : hiddenModels.add(l.model); doFilter(); };
    el.appendChild(d);
  });
}
function syncLegend(){ LEGEND.forEach(l => { const e=document.getElementById('li-'+l.model); if(e) e.classList.toggle('off', hiddenModels.has(l.model)); }); }
function toggleLegend(){ const l=document.getElementById('legend'); l.style.display = l.style.display==='none' ? '' : 'none'; }

function buildSelectors() {
  const states = [...new Set(allRecs.map(r=>r[6]).filter(Boolean))].sort();
  const ss = document.getElementById('sel-s');
  states.forEach(s => { const o=document.createElement('option'); o.value=s; o.textContent=s; ss.appendChild(o); });
  const ms = document.getElementById('sel-m');
  LEGEND.forEach(l => { const o=document.createElement('option'); o.value=l.model; o.textContent=l.model+' ('+l.count.toLocaleString()+')'; ms.appendChild(o); });
}

function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

function darkStyle(){return[
  {elementType:'geometry',stylers:[{color:'#1d2c4d'}]},
  {elementType:'labels.text.fill',stylers:[{color:'#8ec3b9'}]},
  {elementType:'labels.text.stroke',stylers:[{color:'#1a3646'}]},
  {featureType:'administrative.country',elementType:'geometry.stroke',stylers:[{color:'#4b6878'}]},
  {featureType:'administrative.province',elementType:'geometry.stroke',stylers:[{color:'#4b6878'}]},
  {featureType:'landscape.natural',elementType:'geometry',stylers:[{color:'#023e58'}]},
  {featureType:'poi',elementType:'geometry',stylers:[{color:'#283d6a'}]},
  {featureType:'poi.park',elementType:'geometry.fill',stylers:[{color:'#023e58'}]},
  {featureType:'road',elementType:'geometry',stylers:[{color:'#304a7d'}]},
  {featureType:'road',elementType:'labels.text.fill',stylers:[{color:'#98a5be'}]},
  {featureType:'road.highway',elementType:'geometry',stylers:[{color:'#2c6675'}]},
  {featureType:'water',elementType:'geometry',stylers:[{color:'#0e1626'}]},
  {featureType:'water',elementType:'labels.text.fill',stylers:[{color:'#4e6d70'}]},
];}

loadMapsScript();
